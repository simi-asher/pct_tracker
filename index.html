<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow Ananya's PCT Journey</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>Follow Ananya's PCT Journey</h1>
    </header>

    <section class="mile-counter-section">
      <div class="mile-counter-number" id="miles-hiked">—</div>
      <div class="mile-counter-label">MILES HIKED</div>
      <div id="hiker-status" class="hiker-status"></div>
      <div class="mile-counter-sub">
        <span id="miles-of-total">— of 2,653 miles / — km</span>
        &nbsp;·&nbsp;
        <span class="teal" id="pct-percent">—%</span>
      </div>
      <div class="last-update-text">Last GPS update: <span id="last-update">—</span></div>
    </section>

    <section class="tracker-progress-section">
      <div class="tracker-progress-bar" id="progress-bar-wrap">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="current-dot-wrap" id="current-dot-wrap">
          <div class="current-dot"></div>
        </div>
      </div>
      <div class="milestone-legend" id="milestone-legend"></div>
    </section>

    <div class="stats-strip">
      <div class="stat">
        <span class="stat-value" id="days-on-trail">—</span>
        <span class="stat-label">Days on Trail</span>
      </div>
      <div class="stat">
        <span class="stat-value teal" id="pct-percent-stat">—%</span>
        <span class="stat-label">% Complete</span>
      </div>
      <div class="stat">
        <span class="stat-value teal" id="temp-display">—</span>
        <span class="stat-label">Temperature</span>
      </div>
    </div>

    <section class="elevation-section">
      <div class="elevation-header">
        <div class="elev-current">
          <span class="elev-label">CURRENT ELEVATION</span>
          <span class="elev-value teal" id="elev-current">—</span>
        </div>
      </div>
      <div class="elevation-chart-wrap">
        <canvas id="elevation-chart"></canvas>
      </div>
      <div class="elevation-footer">
        <div class="elev-stat"><span class="elev-stat-label">LOW</span><span id="elev-low">—</span></div>
        <div class="elev-stat"><span class="elev-stat-label">HIGH</span><span id="elev-high">—</span></div>
        <div class="elev-stat"><span class="elev-stat-label">GAINED</span><span id="elev-gained">—</span></div>
      </div>
    </section>

    <div id="map"></div>

    <div class="map-legend">
      <div class="legend-item"><span class="legend-line" style="background:#e8943a"></span> California</div>
      <div class="legend-item"><span class="legend-line" style="background:#5a9e50"></span> Oregon</div>
      <div class="legend-item"><span class="legend-line" style="background:#4a7bc8"></span> Washington</div>
      <div class="legend-item"><span class="legend-dot"></span> Current Position</div>
    </div>

    <div id="status-bar">
      <span id="status-text">Loading location data...</span>
      <span id="refresh-countdown"></span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
