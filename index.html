<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow Ananya's PCT Journey</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Follow Ananya's PCT Journey</h1>
    </header>

    <section class="mile-counter-section">
      <div class="mile-counter-number" id="miles-hiked">—</div>
      <div class="mile-counter-label">MILES HIKED</div>
      <div id="hiker-status" class="hiker-status"></div>
      <div class="mile-counter-sub">
        <span id="miles-of-total">— of 2,653 miles / — km</span>
        &nbsp;·&nbsp;
        <span class="teal" id="pct-percent">—%</span>
      </div>
      <div class="last-update-text">Last GPS update: <span id="last-update">—</span></div>
    </section>

    <section class="tracker-progress-section">
      <div class="tracker-progress-bar" id="progress-bar-wrap">
        <div class="seg-ca"></div>
        <div class="seg-or"></div>
        <div class="seg-wa"></div>
        <div class="progress-fill" id="progress-fill"></div>
        <div class="current-dot-wrap" id="current-dot-wrap">
          <div class="current-dot"></div>
        </div>
      </div>
      <div class="progress-labels">
        <span style="flex:1702">California</span>
        <span style="flex:275">Oregon</span>
        <span style="flex:676">Washington</span>
      </div>
    </section>

    <div class="stats-strip">
      <div class="stat">
        <span class="stat-value" id="days-on-trail">—</span>
        <span class="stat-label">Days on Trail</span>
      </div>
      <div class="stat">
        <span class="stat-value teal" id="pct-percent-stat">—%</span>
        <span class="stat-label">% Complete</span>
      </div>
    </div>

    <div id="map"></div>

    <div id="status-bar">
      <span id="status-text">Loading location data...</span>
      <span id="refresh-countdown"></span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
